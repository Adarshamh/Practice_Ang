name: Angular CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.19.1

      - name: Install Dependencies
        run: npm install

      - name: Build Angular Application
        run: npm run build

      - name: Run Angular Tests
        run: npm run test -- --watch=false --browsers=ChromeHeadless

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/studentmanagement-ui:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/studentmanagement-ui:${{ github.run_number }} \
            .

      - name: Push Latest Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/studentmanagement-ui:latest

      - name: Push Version Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/studentmanagement-ui:${{ github.run_number }}