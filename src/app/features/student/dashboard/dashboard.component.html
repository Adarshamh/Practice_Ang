<div class="dashboard-container">

  <div class="dashboard-header mb-4">
    <h2>
      Student Management Dashboard
    </h2>
    <div>
      <button class="btn btn-outline-danger" (click)="logout()">Logout</button>
    </div>
  </div>

  <app-student-form
    (saveStudentEvent)="onSaveStudent($event)">
  </app-student-form>

  <app-student-table
    [students]="students">
  </app-student-table>

</div>
